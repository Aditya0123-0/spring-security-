name: Publish Javadoc to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy-javadoc:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 1. GENERATE THE COMPLETE DOCUMENTATION SITE (Skips tests to avoid DB crashes)
      - name: Build Javadoc Site
        run: mvn clean site -DskipTests

      # 2. DEPLOY THE GENERATED ASSETS
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.TOKEN }} # <-- Keeping your custom secret name
          publish_dir: ./target/site/apidocs