name: Publish Javadoc to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy-javadoc:
    runs-on: ubuntu-latest

    # 1. ADD WRITE PERMISSIONS TO ALLOW BLANKET PUSHES TO GH-PAGES
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 2. RUN JAVADOC GENERATION
      - name: Build Javadoc
        run: mvn -B javadoc:javadoc

      # 3. UPGRADED TO V4 AND PROVIDED EXPLICIT TOKEN
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.TOKEN }}
          publish_dir: ./target/apidocs